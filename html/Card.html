<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        .card{
            width: 270px;
            border: 1px solid rgb(236, 236, 236);
            box-shadow: 0px 0px 5px rgb(219, 219 219);
            margin: 50px;
            padding: 12px;
            border-radius: 10px;
        }
        .top{
            width: 100%;
            height: 200px;
            background-color: gray;
            border-radius: 10px;
        }
        .buttom{
            margin-top: 20px;
            line-height: 30px;
        }
        .name{
            font-size: 23px;
            font-weight: 600px;
            color: rgb(22, 22, 22);
        }
        .price{
            font-size: 14px;
        }
        button{
            padding: 8px 15px;
            background-color: rgb(73, 173, 223);
            border: none;
            border-radius: 5px;
            color: white;
        }
        img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="top">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTu8YEgwNnxdl275c4IgmUDfgdr86sxTjiV4g&s" alt="">
        </div>
        <div class="buttom">
            <p class="name">Wireless Headphones</p>
            <p class="price">$59.99</p>
            <button>Add to Cart</button>
        </div>
    </div>
</body>
</html>
