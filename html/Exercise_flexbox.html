<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        header, footer{
            background-color: skyblue;
            padding: 20px;
            font-size: 30px;
            color: white;
            text-align: center;
        }
        .container, .relate{
            width: 100vw;
            height: 500px;
            margin-top: 10px;
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .left{
            width: 40%;
            height: 100%;
            font-size: 30px;
            color: white;
            text-align: center;
        }
        .right{
            width: 60%;
            height: 100%;
            font-size: 30px;
            color: white;
            text-align: center;
        }
        .hero{
            background-color: blueviolet;
            width: 100%;
            height: 40%;
            display: flex;
            justify-content: center;
            align-items: baseline;
        }
        .side{
            background-color: rgb(97, 150, 97);
            width: 100%;
            height: 60%;
            display: flex;
            justify-content: center;
            align-items: baseline;
            margin-top: 10px;
        }
        .main{
            background-color: rgb(200, 200, 32);
            width: 100%;
            height: 70%;
            display: flex;
            justify-content: center;
            align-items: baseline;
        }
        .extra{
            background-color: gray;
            width: 100%;
            height: 30%;
            display: flex;
            justify-content: center;
            align-items: baseline;
            margin-top: 10px;
        }
        
        .leftralete{
            width: 100%;
            height: 20%;
            font-size: 30px;
            color: white;
            text-align: center;
        }
        .rightralete{
            width: 60%;
            height: 100%;
            font-size: 30px;
            color: white;
            text-align: center;
        }
        .related{
            margin-top: 10px;
            background-color: rgb(16, 102, 23);
            width: 450px;
            height: 20%;
            color: white;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: baseline;
        }
        .pass{
            margin-top: 10px;
            background-color: rgb(188, 71, 156);
            width: 250px;
            height: 20%;
            color: white;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: baseline;
        }
        .footer{
            margin-top: 10px;
            background-color: pink;
        }

        
       
        

    </style>
</head>
<body>
    <header>Header</header>

    <div class="container">
        <div class="left">
            <div class="hero">Hero</div>
            <div class="side">Sidebar</div>
        </div>
        <div class="right">
            <div class="main">Main Content</div>
            <div class="extra">Extra Content</div>
        </div>
    </div>
    <div class="relate">
        <div class="leftrelate">
            <div class="related">Related Images</div>
        </div>
        <div class="rightrelate">
            <div class="pass">Related Pass</div>
        </div>
    </div>
    <footer class="footer">Footer</footer>

   
</body>
</html>
