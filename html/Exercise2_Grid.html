<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 200px);
        }
        
        .box1{
            grid-row: 1/4;
            background-color: red;
        }
        .box2{
            grid-column: 2/4;
            background: rgb(255, 0, 221);
        }
        .box3{
            background-color: brown;
        }
        .box4{
            background-color: chartreuse;
        }
        .box5{
            background-color: darkorange;
        }
        .box6{
            grid-row: 2/4;
            grid-column: 4/5;
            background-color: aqua;
        }
        .box7{
            background-color: blanchedalmond;
        }
        .box8{
            background-color: blue;
        }

       
    </style>
</head>
<body>
    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
        <div class="box5"></div>
        <div class="box6"></div>
        <div class="box7"></div>
        <div class="box8"></div>
    </div>
</body>
</html>
