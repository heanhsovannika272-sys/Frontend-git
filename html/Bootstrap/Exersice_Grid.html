<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <style>
            .main{
                height: 100px;
                background-color:rgb(172, 172, 120);
                margin-top: 10px;
            }
            .blue{
                height: 400px;
            }
            @media(min-width: 940px){
                .main{
                    height: 200px;
                }
                .blue{height: 100px;}
            }
            @media(min-width: 1200px){
                .main{
                    height: 400px;
                }
                .blue{
                    height: 400px;
                }
            }
        </style>
</head>
<body>
     <div class="row row-cols-1 row-cols-lg-2 g-2">

            <div style="height: 100px;" class="bg-warning"></div>

        <div class="col">

     </div>

     <div class="main"></div>

            <div class="bg-primary blue"></div>
        </div>
        <div class="col">

        </div>
        <div class="col">

        </div>
     </div>

     <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-2 mt-2">
        <div class="col">
            <div style="height: 300px;" class="bg-secondary"></div>

        <div class="col">
            <div style="height: 300px;" class="bg-secondary"></div>
        </div>
        <div class="col">
