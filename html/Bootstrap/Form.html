<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    
    <form class=" bg-white w-50 m-auto mt-5 rounded-2 p-3 border border-1">
        <h2 style="text-align: center;">Signup</h2>

        <div class="d-flex flex-column gap-2">
            <div>
                <label class="form-label" for="email"></label>
                <input class="form-control" id="email" type="email" placeholder="email">
            </div>
            <div>
                <label class="form-label" for="password"></label>
                <input class="form-control" id="password" type="password" placeholder="Create password">
            </div>
            
            <div>
                <label class="form-label" for="password"></label>
                <input class="form-control" id="password" type="password" placeholder="Confirm password">
            </div>
            
            <div>
                <button class="btn btn-primary w-100" style="text-align: center;">Signup</button>
            </div>

            <div>
                <p class="text-secondary" style="text-align: center;">Already have an account? <a href="#">Login</a></p>
            </div>

            <div class="d-flex gap-2">
                <hr class="w-100">
                <p class="text-secondary">Or</p>
                <hr class="w-100">
            </div>

            <div>
                <button class="btn btn-primary w-100 d-flex justify-content-start align-items-center gap-5">
                    <img width="30px" height="30px" src="https://static.vecteezy.com/system/resources/previews/042/127/158/non_2x/round-blue-facebook-logo-with-white-thick-border-and-long-shadow-on-a-transparent-background-free-png.png" alt="">
                    <p class="m-0">Login with Facebook</p>
                </button>
            </div>
            <div>
                <button class="btn border border-1 w-100 d-flex justify-content-start align-items-center gap-5">
                    <img width="30px" height="30px" src="https://i.pinimg.com/236x/d7/2f/a6/d72fa6b024b43e3957b9ed95fdbf79e2.jpg" alt="">
                    <p class="m-0">Login with google</p>
                </button>
            </div>
            
        </div>
        
    </form>
</body>
</html>
