<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="sty">
<style>
    *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
.container{
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 250px 250px 250px;
    gap: 10px;
    flex-wrap: wrap;

}
.box{
    padding: 30px;
    border: 2px solid red;
    color: black;
    font-weight: bolder;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 20px;
    background-color: rgb(218, 123, 198);

}
@media(max-width:976px){
    .container{
        grid-template-columns: 1fr;
    }
}
@media(max-width:768px){
    .container{
        grid-template-columns: 1fr 1fr;
    }
}
@media(max-width:567px){
    .container{
        grid-template-columns: 1fr;
    }
    .box{
        color: blue;
    }
}
</style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h1>box-1</h1>
        </div>
        <div class="box">
            <h1>box-2</h1>
        </div>
        <div class="box">
            <h1>box-3</h1>
        </div>
        <div class="box">
            <h1>box-4</h1>
        </div>
        <div class="box">
            <h1>box-5</h1>
        </div>
        <div class="box">
            <h1>box-6</h1>
        </div>
        <div class="box">
            <h1>box-7</h1>
        </div>
        <div class="box">
            <h1>box-8</h1>
        </div>
        <div class="box">
            <h1>box-9</h1>
        </div>
    </div>
</body>
</html>
