<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Student Registration Form</h1>
    
    <form>
        <label for="Full Name :">Full Name</label><br>
        <input  type="text" placeholder="Enter your full name">
        <br><br>
        <label for="Username :">Username</label><br>
        <input  type="text" placeholder="Enter username">
        <br><br>
        <label for="Password">Password</label><br>
        <input  type="text" placeholder="Enter password">
        <br><br>
        <label for="email">Email :</label><br>
        <input type="text" placeholder="enter email"><br>
        <br>
        <label for="Age">Age :</label><br>
        <input type="text" placeholder="enter age"><br>
        <br>
        <label for="phone">Phone :</label><br>
        <input type="text" placeholder="enter phone number"><br>
        <br>
        <button type="submit">Resgister</button>
        <button type="reset">Clear</button>
    </form>
    <form>
        <p>Gender</p>
        <input id="Male" type="radio" name="Gender">
        <label for="Male">Male</label><br>

        <input id="Female" type="radio" name="Gender">
        <label for="Female">Female</label><br>

        <input id="other" type="radio" name="Gender">
        <label for="other">Other</label><br>
    </form>
    <form>

        <p>Select your hobbies</p>

        <input id="reading" type="checkbox" name="hobbies">
        <label for="reading">Reading</label><br>

        <input id="Music" type="checkbox" name="hobbies">
        <label for="Music">Music</label><br>

        <input id="sport" type="checkbox" name="hobbies">
        <label for="sport">Sport</label><br>
    </form>
    <form>

        <p>Select your country</p>
        <select>
            <option value="" disabled selected>Choose your country</option>
            <option value="Cambodia">Cambodia</option>
            <option value="Japan">Japan</option>
            <option value="USA">USA</option>
        </select>
    </form>
    <form>

        <fieldset style="width: 400px;">

            <legend>Personal info</legend>

            <label for="">email</label><br>
            <input type="text"><br>

            <label for="">password</label><br>
            <input type="text"><br><br>
            <button>sign up</button>
        </fieldset>
    </form>
</body>
</html>
